# ============================================================================
# 7. DOMAIN-SPECIFIC EXTRACTION PROMPTS (Extensible)
# ============================================================================
# Vision model prompts tailored to each domain.
# These prompts guide the vision model to extract domain-specific information.
# To add a new domain prompt:
#   1. Add domain key matching domain_keywords section
#   2. Write extraction instructions specific to that domain
#
domain_prompts:
  financial: "Focus on extracting financial data, tables, and numerical values with high precision. Preserve currency symbols and decimal places."
  legal: "Extract all text preserving legal structure, clauses, and formatting. Maintain section numbering and hierarchical structure."
  technical: "Extract technical specifications, diagrams descriptions, and structured data. Preserve code blocks and technical notation."
  medical: "Extract medical information, patient data, and clinical findings carefully. Maintain medical terminology and abbreviations."
  general: "Extract all text and structured data from this document. Preserve reading order and structure."

# ============================================================================
# 8. ESCALATION RULES
# ============================================================================
# Controls automatic escalation behavior when confidence is low.
# - enabled: Master switch for escalation feature
# - confidence_threshold: Escalate if confidence below this (should match confidence.escalation_threshold)
# - max_attempts: Maximum number of escalation attempts
# - strategy_order: Escalation path (strategies tried in order)
# - force_escalation_if: Conditions that trigger immediate escalation
#
escalation:
  enabled: true
  confidence_threshold: 0.7  # Must match confidence.escalation_threshold
  max_attempts: 3            # Maximum escalation attempts
  
  # Escalation path: strategies are tried in this order
  strategy_order:
    - fast_text
    - layout_aware
    - vision_augmented
  
  # Conditions that trigger immediate escalation (bypass initial strategy)
  force_escalation_if:
    scanned_image: true           # Always escalate scanned images
    table_count_exceeds: 10       # Escalate if >10 tables detected
    multi_column: true            # Escalate multi-column layouts
    handwriting_detected: true    # Escalate if handwriting present


# ============================================================================
# 9. EXTRACTION STRATEGY CONFIGURATION
# ============================================================================
# Configuration for extraction strategies behavior
# - use_docling_fast_mode: Enable Docling in FAST mode (no OCR/AI) for layout extraction
# - docling_fallback_to_pdfplumber: Fallback to pdfplumber if Docling fails
#
extraction_strategies:
  layout_aware:
    use_docling_fast_mode: true    # Use Docling FAST mode (no OCR, optimized for native PDFs)
    docling_fallback: true          # Fallback to pdfplumber if Docling unavailable
  fast_text:
    use_layout_mode: false          # Use pdfplumber's layout=True for better structure
  vision:
    use_docling_preprocessing: true # Use Docling FAST to extract layout before Gemini OCR
    max_retries: 3                  # Retry failed API calls
    timeout_seconds: 30             # API timeout
