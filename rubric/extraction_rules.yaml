# Extraction Rules Configuration
# Document Intelligence Refinery
#
# This configuration file externalizes all tunable parameters for the extraction pipeline.
# New domains can be onboarded by editing this file without code changes.
#
# Configuration Sections:
# 1. Confidence Thresholds - Control quality gates for each strategy
# 2. Origin Detection - Parameters for classifying document source type
# 3. Layout Complexity - Thresholds for layout classification
# 4. Chunking Rules - Semantic chunking constitution
# 5. Cost Limits - Budget caps and per-page costs
# 6. Domain Keywords - Keywords for domain classification (extensible)
# 7. Domain Prompts - Vision model prompts per domain (extensible)
# 8. Escalation Rules - Automatic escalation behavior

# ============================================================================
# 1. CONFIDENCE THRESHOLDS
# ============================================================================
# These thresholds control quality gates for extraction strategies.
# - fast_text_minimum: Minimum confidence for fast text extraction to be acceptable
# - layout_aware_minimum: Minimum confidence for layout-aware extraction
# - vision_minimum: Minimum confidence for vision-augmented extraction
# - escalation_threshold: Trigger escalation if confidence falls below this
#
confidence:
  fast_text_minimum: 0.7      # 70% confidence required
  layout_aware_minimum: 0.75  # 75% confidence required
  vision_minimum: 0.8         # 80% confidence required
  escalation_threshold: 0.7   # Escalate if below 70%

# ============================================================================
# 2. ORIGIN TYPE DETECTION (Short-Circuit Waterfall)
# ============================================================================
# Parameters for classifying whether document is native digital or scanned.
# Uses a 3-pass waterfall algorithm that short-circuits for efficiency:
#   Pass 1 (Microsecond): PyMuPDF font check - no fonts = scanned
#   Pass 2 (Millisecond): pdfplumber image ratio - >80% image = hybrid
#   Pass 3 (Second): Docling layout detection - only for native digital
#
# - min_char_density: Minimum characters per point² for native digital
# - max_image_ratio: Maximum image-to-page ratio (80% threshold for short-circuit)
# - font_metadata_weight: Weight of font metadata presence in classification
#
origin_detection:
  min_char_density: 0.01   # chars per point²
  max_image_ratio: 0.8     # 80% threshold - triggers Pass 2 short-circuit
  font_metadata_weight: 0.3  # 30% weight in decision

# ============================================================================
# 3. LAYOUT COMPLEXITY
# ============================================================================
# Thresholds for classifying document layout complexity.
# - table_heavy_threshold: Number of tables to classify as table-heavy
# - multi_column_threshold: Number of columns to classify as multi-column
#
layout:
  table_heavy_threshold: 10  # 10+ tables = table-heavy
  multi_column_threshold: 2   # 2+ columns = multi-column

# ============================================================================
# 4. CHUNKING RULES (Constitution)
# ============================================================================
# Semantic chunking rules that preserve document structure.
# These rules ensure LDUs maintain semantic coherence.
# - max_tokens: Maximum tokens per chunk
# - overlap_tokens: Token overlap between adjacent chunks
# - rules: List of semantic preservation rules
#
chunking:
  max_tokens: 512      # Maximum chunk size
  overlap_tokens: 50   # Overlap for context preservation
  
  rules:
    - name: "table_integrity"
      description: "Table cells never split from headers"
      priority: 1
      
    - name: "figure_caption_binding"
      description: "Figure captions stored as parent metadata"
      priority: 2
      
    - name: "list_coherence"
      description: "Numbered lists kept as single LDU unless exceeds max_tokens"
      priority: 3
      
    - name: "section_hierarchy"
      description: "Section headers stored as parent metadata on child chunks"
      priority: 4
      
    - name: "cross_reference_resolution"
      description: "Cross-references resolved and stored as relationships"
      priority: 5

# ============================================================================
# 5. COST LIMITS
# ============================================================================
# Budget caps and per-page costs for each extraction strategy.
# - max_per_document: Global budget cap per document (USD)
# - vlm_budget_cap: Vision model specific budget cap per document (USD)
# - fast_text_per_page: Cost per page for fast text extraction
# - layout_aware_per_page: Cost per page for layout-aware extraction
# - vision_per_page: Cost per page for vision-augmented extraction
#
cost:
  max_per_document: 1.0    # $1.00 global cap
  vlm_budget_cap: 1.0      # $1.00 vision model cap
  fast_text_per_page: 0.001  # $0.001/page
  layout_aware_per_page: 0.01  # $0.01/page
  vision_per_page: 0.02    # $0.02/page

# ============================================================================
# 6. DOMAIN KEYWORDS (Extensible)
# ============================================================================
# Keywords for domain classification during triage.
# To onboard a new domain:
#   1. Add a new domain key (e.g., 'scientific')
#   2. List relevant keywords
#   3. Add corresponding entry in domain_prompts section
#   4. Update DomainHint enum in src/models/document_profile.py
#
domain_keywords:
